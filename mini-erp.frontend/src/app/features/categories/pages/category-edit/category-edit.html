<section class="page-shell">
  <div class="intro-card">
    <p class="eyebrow">Categorías</p>
    <h2>Editar categoría</h2>
    <p>Actualizá la información de la categoría seleccionada.</p>
  </div>

  @if (pageLoading) {
    <p class="state-message">Cargando categoría...</p>
  }

  @if (!pageLoading && errorMessage) {
    <small class="error">{{ errorMessage }}</small>
  }

  @if (!pageLoading && initialValue) {
    <app-category-form
      [initialValue]="initialValue"
      [loading]="loading"
      submitText="Guardar cambios"
      (formSubmit)="onSubmit($event)"
    />
  }
</section>
