<h2>Categorías</h2>

@if (loading) {
  <p>Cargando...</p>
}

@if (!loading && categories.length === 0) {
  <p>No hay categorías.</p>
}

@if (categories.length > 0) {

  <table class="table">

    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
      </tr>
    </thead>

    <tbody>

      @for (category of categories; track category.id) {

        <tr>
          <td>{{ category.id }}</td>
          <td>{{ category.name }}</td>
        </tr>

      }

    </tbody>

  </table>

}
